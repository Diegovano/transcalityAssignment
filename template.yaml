Transform: AWS::Serverless-2016-10-31
Resources:
  Metadata:
    Dockerfile: Dockerfile

  SumosimFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      FunctionName: intern-diego-van-overberghe-sumo-sim
      ImageConfig:
        Command:
          - sumo_sim.sumo_sim_handler
      Policies:
      - Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
            Resource:
              - arn:aws:s3:::transcality-intern/shared/*
          - Effect: Allow
            Action:
              - s3:PutObject
            Resource:
              - arn:aws:s3:::transcality-intern/intern-diego-van-overberghe/*
    
  PostprocessFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      FunctionName: intern-diego-van-overberghe-postprocess
      ImageConfig:
        Command:
          - postprocess.postprocess_handler
      Policies:
      - Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
            Resource:
              - arn:aws:s3:::transcality-intern/intern-diego-van-overberghe/*
          - Effect: Allow
            Action:
              - s3:PutObject
            Resource:
              - arn:aws:s3:::transcality-intern/intern-diego-van-overberghe/*

  FinaliseFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      FunctionName: intern-diego-van-overberghe-finalise
      ImageConfig:
        Command:
          - finalise.finalise_header
      Policies:
      - Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
            Resource:
              - arn:aws:s3:::transcality-intern/intern-diego-van-overberghe/*
          - Effect: Allow
            Action:
              - s3:PutObject
            Resource:
              - arn:aws:s3:::transcality-intern/intern-diego-van-overberghe/*

  FailureFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      FunctionName: intern-diego-van-overberghe-failure
      ImageConfig:
        Command:
          - failure.failure_handler
      Policies:
      - Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
            Resource:
              - arn:aws:s3:::transcality-intern/intern-diego-van-overberghe/*

  StateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: intern-diego-van-overberghe-pipeline
      Definition:
        StartsAt: "SumoSimState"
        States:
          SumoSimState:
            Type: Task
            Resource: arn:aws:states:::lambda:invoke
            Parameters:
              FunctionName: !GetAtt SumosimFunction.Arn
              Payload:
                scenario_zip_url.$: "$.scenario_zip_url"
                output_prefix.$: "$.output_prefix"
            OutputPath: "$.Payload"
            Retry:
              - ErrorEquals: ["States.ALL"]
                IntervalSeconds: 2
                BackoffRate: 2.0
                MaxAttempts: 2
            Catch:
              - ErrorEquals: ["States.ALL"]
                ResultPath: "$.error"
                Next: FailureState
            Next: PostprocessState

          PostprocessState:
            Type: Task
            Resource: arn:aws:states:::lambda:invoke
            Parameters:
              FunctionName: !GetAtt PostprocessFunction.Arn
              Payload:
                edge_output_url.$: "$.edge_output_url"
                output_prefix.$: "$.output_prefix"
            OutputPath: "$.Payload"
            Retry:
              - ErrorEquals: ["States.ALL"]
                IntervalSeconds: 2
                BackoffRate: 2.0
                MaxAttempts: 2
            Catch:
              - ErrorEquals: ["States.ALL"]
                ResultPath: "$.error"
                Next: FailureState
            Next: FinaliseState

          FinaliseState:
            Type: Task
            Resource: arn:aws:states:::lambda:invoke
            Parameters:
              FunctionName: !GetAtt FinaliseFunction.Arn
              Payload:
                parquet_url.$: "$.parquet_url"
                output_prefix.$: "$.output_prefix"
            OutputPath: "$.Payload"
            Retry:
              - ErrorEquals: ["States.ALL"]
                IntervalSeconds: 2
                BackoffRate: 2.0
                MaxAttempts: 2
            Catch:
              - ErrorEquals: ["States.ALL"]
                ResultPath: "$.error"
                Next: FailureState
            End: true

          FailureState:
            Type: Task
            Resource: arn:aws:states:::lambda:invoke
            Parameters:
              FunctionName: !GetAtt FailureFunction.Arn
              Payload:
                execution_id.$: "$$.Execution.Id"
                error.$: "$.error"

            ResultPath: "$.failure"
            Retry:
              - ErrorEquals: ["States.ALL"]
                IntervalSeconds: 2
                BackoffRate: 2.0
                MaxAttempts: 2
            End: true

      Policies:
        - LambdaInvokePolicy:
            FunctionName: "*"

Outputs:
  StateMachineArn:
    Value: !Ref StateMachine

  SumosimArn:
    Value: !GetAtt SumosimFunction.Arn

  PostprocessArn:
    Value: !GetAtt PostprocessFunction.Arn

  FinaliseArn:
    Value: !GetAtt FinaliseFunction.Arn